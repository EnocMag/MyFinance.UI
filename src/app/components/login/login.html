<div class="min-h-screen flex items-center justify-center px-4">
  <div
    class="max-w-md w-full p-10 bg-white shadow-2xl rounded-3xl border border-gray-100 transition-all">

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-50 rounded-2xl mb-4">
        <!-- Microsoft icon -->
        <svg class="w-8 h-8" viewBox="0 0 24 24">
          <rect x="1" y="1" width="10" height="10" fill="#F25022"></rect>
          <rect x="13" y="1" width="10" height="10" fill="#7FBA00"></rect>
          <rect x="1" y="13" width="10" height="10" fill="#00A4EF"></rect>
          <rect x="13" y="13" width="10" height="10" fill="#FFB900"></rect>
        </svg>
      </div>

      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">
        Welcome to <span class="text-emerald-600">MyFinance</span>
      </h1>

      <p class="text-gray-500 mt-2 text-sm">
        Sign in with your Microsoft account to continue.
      </p>
    </div>

    <!-- Microsoft Login -->
    <button
      (click)="login()"
      class="w-full flex items-center justify-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-xl font-bold text-lg shadow-lg shadow-emerald-100 transition-all active:scale-[0.98] hover:cursor-pointer">

      <!-- Microsoft logo -->
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <rect x="1" y="1" width="10" height="10" fill="#F25022"></rect>
        <rect x="13" y="1" width="10" height="10" fill="#7FBA00"></rect>
        <rect x="1" y="13" width="10" height="10" fill="#00A4EF"></rect>
        <rect x="13" y="13" width="10" height="10" fill="#FFB900"></rect>
      </svg>

      Sign in with Microsoft
    </button>

    <!-- Footer -->
    <div class="mt-10 pt-6 border-t border-gray-100 text-center">
      <img
        src="assets/img/moneydebt-out-backR.png"
        alt="Financial freedom"
        class="w-40 mx-auto opacity-80 hover:opacity-100 transition-opacity duration-500"
      />
      <p class="text-xs text-gray-400 mt-4">
        Secure Financial Management v1.0
      </p>
    </div>

  </div>
</div>
